services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --mode dev-container
      - --smp 1
      - --memory 512M
    ports:
      - "19092:19092"
      - "9644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info --brokers localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  console:
    image: redpandadata/console:latest
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── WebSocket workers (each holds up to MAX_SUBS Massive subscriptions) ─────

  ws-worker-1:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      WORKER_ID: ws-worker-1
      WORKER_PORT: "8001"
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      MAX_SUBS: "100"
      MASSIVE_API_KEY: ${MASSIVE_API_KEY}
    depends_on:
      redpanda:
        condition: service_healthy
    expose:
      - "8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ws-worker-2:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      WORKER_ID: ws-worker-2
      WORKER_PORT: "8001"
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      MAX_SUBS: "100"
      MASSIVE_API_KEY: ${MASSIVE_API_KEY}
    depends_on:
      redpanda:
        condition: service_healthy
    expose:
      - "8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ws-worker-3:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      WORKER_ID: ws-worker-3
      WORKER_PORT: "8001"
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      MAX_SUBS: "100"
      MASSIVE_API_KEY: ${MASSIVE_API_KEY}
    depends_on:
      redpanda:
        condition: service_healthy
    expose:
      - "8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── API (public-facing HTTP + WebSocket) ────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      API_PORT: "8000"
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      REDIS_URL: redis://redis:6379
      MAX_SUBS: "100"
      WORKER_ADDRS: ws-worker-1:8001,ws-worker-2:8001,ws-worker-3:8001
      TICKERS_FILE: /data/tickers.json
    volumes:
      - api_data:/data
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
      ws-worker-1:
        condition: service_healthy
      ws-worker-2:
        condition: service_healthy
      ws-worker-3:
        condition: service_healthy

volumes:
  redpanda_data:
  redis_data:
  api_data:
