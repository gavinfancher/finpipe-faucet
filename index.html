<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Prices</title>
  <style>
    body { font-family: monospace; background: #0d1117; color: #e6edf3; padding: 2rem; }
    h2 { color: #58a6ff; }
    table { border-collapse: collapse; width: 500px; }
    th { text-align: left; padding: 6px 16px; color: #8b949e; border-bottom: 1px solid #30363d; }
    td { padding: 6px 16px; border-bottom: 1px solid #21262d; }
    .up { color: #3fb950; }
    .down { color: #f85149; }
    #status { font-size: 0.8rem; color: #8b949e; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <h2>Live Prices</h2>
  <div id="status">connecting...</div>
  <table>
    <thead>
      <tr><th>Ticker</th><th>Price</th><th>Chg from Open</th><th>Volume</th></tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <script>
    const rows = {}
    const ws = new WebSocket("ws://localhost:8000/ws")

    ws.onopen = () => document.getElementById("status").textContent = "connected"
    ws.onclose = () => document.getElementById("status").textContent = "disconnected"

    ws.onmessage = (event) => {
      const d = JSON.parse(event.data)
      const pct = d.pct_change_from_open
      const cls = pct >= 0 ? "up" : "down"
      const pctStr = pct != null ? (pct >= 0 ? "+" : "") + pct.toFixed(2) + "%" : "--"

      if (!rows[d.symbol]) {
        const tr = document.createElement("tr")
        tr.id = `row-${d.symbol}`
        document.getElementById("rows").appendChild(tr)
        rows[d.symbol] = tr
      }

      rows[d.symbol].innerHTML = `
        <td>${d.symbol}</td>
        <td class="${cls}">$${d.close.toFixed(2)}</td>
        <td class="${cls}">${pctStr}</td>
        <td>${d.volume.toLocaleString()}</td>
      `
    }
  </script>
</body>
</html>
